{% extends 'base.html' %}

{% block content %}

<div class="card">
    <h2>Edit Employee</h2>

    <form action="{{ url_for('update_employee', id=employee.id) }}" method="POST" class="form">

        <input type="text" name="emp_code" value="{{ employee.emp_code }}" required>
        <input type="text" name="name" value="{{ employee.name }}" required>
        <input type="text" name="role" value="{{ employee.role }}" required>
        <input type="text" name="department" value="{{ employee.department }}" required>

        <button type="submit">Update Employee</button>
    </form>

    <br>
    <a href="{{ url_for('index') }}">← Back</a>
</div>

{% endblock %}
